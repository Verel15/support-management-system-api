services:
  postgres:
    image: postgres:17-alpine
    container_name: support-management-postgres
    environment:
      POSTGRES_DB: support_management_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d support_management_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: support-management-api
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/support_management_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
