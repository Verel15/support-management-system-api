spring:
  application:
    name: support-management-system-api
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    open-in-view: false

application:
  security:
    jwt:
      secret: ${JWT_SECRET}
      issuer: support-management-system-api
      audience: support-management-system-api-client
      access-token-expiration: 3600000
      refresh-token-expiration: 2592000000

app:
  upload:
    max-file-size-bytes: 10485760
    allowed-content-types:
      - image/jpeg
      - image/png
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    local-base-path: ${user.home}/uploads

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method